name: Catalog Deploy to Supabase

on:
  workflow_dispatch:
    inputs:
      bundle:
        description: "Preset bundle"
        required: true
        type: choice
        default: "priority2_batch1"
        options:
          - priority1
          - priority2
          - priority2_batch1
          - priority2_batch2
          - priority2_batch3
      catalog_csv:
        description: "Catalog CSV path (optional override, filename is ok)"
        required: false
        default: ""
      alias_csv:
        description: "Alias CSV path (optional override, filename is ok)"
        required: false
        default: ""
      dry_run:
        description: "Run without writing"
        required: true
        default: true
        type: boolean
      stop_on_error:
        description: "Stop on first error"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve catalog/alias paths
        id: paths
        run: |
          bundle="${{ inputs.bundle }}"
          catalog_input="${{ inputs.catalog_csv }}"
          alias_input="${{ inputs.alias_csv }}"

          normalize_path() {
            local raw="$1"
            if [ -z "$raw" ]; then
              echo ""
              return
            fi
            if [[ "$raw" == */* ]]; then
              echo "$raw"
            else
              echo "backend/sql/$raw"
            fi
          }

          case "$bundle" in
            priority1)
              catalog="backend/sql/food_catalog_priority1_import_draft.csv"
              alias="backend/sql/food_aliases_priority1_import_draft.csv"
              ;;
            priority2)
              catalog="backend/sql/food_catalog_priority2_import_draft.csv"
              alias="backend/sql/food_aliases_priority2_import_draft.csv"
              ;;
            priority2_batch1)
              catalog="backend/sql/food_catalog_priority2_batch1_import_draft.csv"
              alias="backend/sql/food_aliases_priority2_batch1_import_draft.csv"
              ;;
            priority2_batch2)
              catalog="backend/sql/food_catalog_priority2_batch2_import_draft.csv"
              alias="backend/sql/food_aliases_priority2_batch2_import_draft.csv"
              ;;
            priority2_batch3)
              catalog="backend/sql/food_catalog_priority2_batch3_import_draft.csv"
              alias="backend/sql/food_aliases_priority2_batch3_import_draft.csv"
              ;;
            *)
              echo "Unknown bundle: $bundle" >&2
              exit 1
              ;;
          esac

          catalog_override="$(normalize_path "$catalog_input")"
          alias_override="$(normalize_path "$alias_input")"
          if [ -n "$catalog_override" ]; then
            catalog="$catalog_override"
          fi
          if [ -n "$alias_override" ]; then
            alias="$alias_override"
          fi

          if [ ! -f "$catalog" ]; then
            echo "Catalog CSV not found: $catalog" >&2
            ls -1 backend/sql/food_catalog*_draft.csv || true
            exit 1
          fi
          if [ ! -f "$alias" ]; then
            echo "Alias CSV not found: $alias" >&2
            ls -1 backend/sql/food_aliases*_draft.csv || true
            exit 1
          fi

          echo "catalog_csv=$catalog" >> "$GITHUB_OUTPUT"
          echo "alias_csv=$alias" >> "$GITHUB_OUTPUT"
          echo "Using catalog_csv: $catalog"
          echo "Using alias_csv: $alias"

      - name: Validate selected CSV files
        run: |
          python tools/catalog_validate_bundle.py \
            --catalog-file "${{ steps.paths.outputs.catalog_csv }}" \
            --alias-file "${{ steps.paths.outputs.alias_csv }}" \
            --allow-ambiguous-alias

      - name: Upsert to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "Missing secret: SUPABASE_URL" >&2
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing secret: SUPABASE_SERVICE_ROLE_KEY" >&2
            exit 1
          fi

          CMD=(python tools/catalog_upsert_supabase.py \
            --catalog "${{ steps.paths.outputs.catalog_csv }}" \
            --alias "${{ steps.paths.outputs.alias_csv }}")

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            CMD+=(--dry-run)
          fi
          if [ "${{ inputs.stop_on_error }}" = "true" ]; then
            CMD+=(--stop-on-error)
          fi

          "${CMD[@]}"
